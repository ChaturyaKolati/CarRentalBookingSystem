<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Cars</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">
            <a href="index.html">🚗 Rent Ride</a>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="cars.html">Available Cars</a></li>
            <li><a href="booking.html">Book Now</a></li>
            <li><a href="history.html" class="bookings-btn">My Bookings</a></li>
            <li><a href="login.html">Login</a></li>
            <li><button id="themeBtn">🌙</button></li>
        </ul>
        </nav>

    <h1 class="page-title">Available Cars</h1>

    <div class="search-section">
        <input type="text" id="searchCar" placeholder="Search Car">

        <select id="carType">
            <option value="all">All Cars</option>
            <option value="Luxury">Luxury</option>
            <option value="SUV">SUV</option>
            <option value="Sedan">Sedan</option>
        </select>
    </div>

    <div class="car-grid" id="carGrid">

        <div class="car-card" data-type="Luxury">
            <img src="car1.avif" alt="BMW 7 Series">

            <div class="content">
                <h3>BMW 7 Series</h3>
                <p>₹5000/day</p>
                <a href="booking.html" class="btn">Book</a>
            </div>
        </div>

        <div class="car-card" data-type="SUV">
            <img src="car2.avif" alt="Audi Q7">

            <div class="content">
                <h3>Audi Q7</h3>
                <p>₹4500/day</p>
                <a href="booking.html" class="btn">Book</a>
            </div>
        </div>

        <div class="car-card" data-type="Sedan">
            <img src="car3.avif" alt="Mercedes E-Class">

            <div class="content">
                <h3>Mercedes E-Class</h3>
                <p>₹6000/day</p>
                <a href="booking.html" class="btn">Book</a>
            </div>
        </div>

        <div class="car-card" data-type="Luxury">
            <img src="car4.avif" alt="Toyota Vellfire">

            <div class="content">
                <h3>Toyota Vellfire</h3>
                <p>₹7500/day</p>
                <a href="booking.html" class="btn">Book</a>
            </div>
        </div>

        <div class="car-card" data-type="SUV">
            <img src="car5.avif" alt="Hyundai Exter">

            <div class="content">
                <h3>Hyundai Exter</h3>
                <p>₹4500/day</p>
                <a href="booking.html" class="btn">Book</a>
            </div>
        </div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
