<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">
            <a href="index.html">🚗 Rent Ride</a>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="cars.html">Available Cars</a></li>
            <li><a href="booking.html">Book Now</a></li>
            <li><a href="history.html" class="bookings-btn">My Bookings</a></li>
            <li><a href="login.html">Login</a></li>
            <li><button id="themeBtn">🌙</button></li>
        </ul>
        </nav>


    <div class="booking-container">

        <h2>Book Your Car</h2>

        <form id="bookingForm">

            <select id="carName">
                <option>BMW 7 Series</option>
                <option>Audi Q7</option>
                <option>Mercedes E-Class</option>
                <option>Toyota Vellfire</option>
                <option>Hyundai Exter</option>
            </select>

            <input type="text" id="pickupLocation" placeholder="Pickup Location" required>

            <input type="text" id="returnLocation" placeholder="Return Location">

            <input type="date" id="pickupDate" required>

            <input type="date" id="returnDate" required>

            <label>Upload Driving License</label>

            <input type="file" id="license" accept="image/*,.pdf" required>

            <img id="preview" width="200">

            <button type="submit">Confirm Booking</button>

        </form>

        <h3 id="totalPrice"></h3>
        <!-- <div id="bookingSummary"></div> -->
        <a href="history.html" class="btn booking-btn">View My Bookings</a>

    </div>
    <footer>
    <p>© 2026 Rent Ride. All Rights Reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
